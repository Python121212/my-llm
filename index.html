<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e24">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムスクロールバー非表示設定 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#131314] text-[#e3e3e3] font-sans h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#1e1e24] p-4 flex-col justify-between hidden md:flex">
        <div>
            <h1 class="text-xl font-semibold text-white mb-6 px-2">Local Gemini</h1>
            <button onclick="window.location.reload()" class="w-full bg-[#282a36] hover:bg-[#343746] text-sm py-2.5 px-4 rounded-full flex items-center gap-2 transition">
                <span>+</span> 新しいチャット
            </button>
        </div>
        <div class="text-xs text-gray-500 p-2">
            Powered by WebLLM
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <header class="p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-[#282a36] gap-3">
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <span class="text-lg font-medium hidden sm:inline">Model:</span>
                <select id="model-select" class="bg-[#1e1e24] text-white text-sm rounded-xl p-2 border border-gray-600 focus:outline-none w-full sm:w-72 cursor-pointer">
                    <optgroup label="Qwen (日本語最適・おすすめ)">
                        <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC" selected>Qwen2.5-1.5B [4bit] (軽量・快適)</option>
                        <option value="Qwen2.5-7B-Instruct-q4f16_1-MLC">Qwen2.5-7B [4bit] (高精度・PC用)</option>
                        <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen2.5-0.5B [4bit] (超軽量・スマホ用)</option>
                    </optgroup>
                    <optgroup label="Gemma 2 (Google・Geminiの系譜)">
                        <option value="gemma-2-2b-it-q4f16_1-MLC">Gemma-2-2B [4bit] (バランス良)</option>
                        <option value="gemma-2-9b-it-q4f16_1-MLC">Gemma-2-9B [4bit] (高性能)</option>
                    </optgroup>
                    <optgroup label="Llama 3.2 / 3.1 (Meta標準モデル)">
                        <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama-3.2-3B [4bit]</option>
                        <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama-3.2-1B [4bit]</option>
                        <option value="Llama-3.1-8B-Instruct-q4f16_1-MLC">Llama-3.1-8B [4bit]</option>
                    </optgroup>
                    <optgroup label="Phi 3.5 (Microsoft軽量モデル)">
                        <option value="Phi-3.5-mini-instruct-q4f16_1-MLC">Phi-3.5-Mini [4bit]</option>
                    </optgroup>
                </select>
            </div>
            <div id="status" class="text-xs bg-[#282a36] px-3 py-1.5 rounded-full text-gray-400 max-w-full truncate">
                AI初期化中...
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:px-24 space-y-6 no-scrollbar pb-32">
            <div class="flex gap-4 items-start">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex-shrink-0 flex items-center justify-center text-xs font-bold text-white">AI</div>
                <div class="space-y-2 max-w-[85%]">
                    <p class="text-gray-200 leading-relaxed">こんにちは！ブラウザ上のローカル環境で完結するAIチャットです。上のメニューからモデルを変更することもできます。何か質問はありますか？</p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#131314] via-[#131314] to-transparent pt-6 pb-4 px-4 md:px-24">
            <div class="max-w-4xl mx-auto bg-[#1e1e24] rounded-3xl p-2 flex items-center border border-transparent focus-within:border-[#4b5563] transition shadow-lg">
                <input type="text" id="user-input" disabled
                    class="flex-1 bg-transparent px-4 py-2 text-white placeholder-gray-500 focus:outline-none text-base w-full" 
                    placeholder="モデルのロード完了までお待ちください..."
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()" disabled
                    class="bg-[#2f303a] hover:bg-[#3e3f4d] disabled:opacity-40 text-white w-10 h-10 rounded-full flex items-center justify-center transition flex-shrink-0">
                    ➔
                </button>
            </div>
            <p class="text-[11px] text-center text-gray-500 mt-2">
                初回のみ数十MB〜数GBのモデルダウンロードが発生します（ブラウザに自動キャッシュされます）。
            </p>
        </div>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        let engine = null;
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('status');
        const modelSelect = document.getElementById('model-select');

        let messages = [];

        // チャットエンジンの初期化
        async function initChat(modelName) {
            // UIを一時的にロック
            userInput.disabled = true;
            sendBtn.disabled = true;
            userInput.placeholder = "モデルを読み込み中...";
            
            try {
                // 既存のエンジンがある場合は一旦破棄
                if (engine) {
                    const activeEngine = await engine;
                    if (activeEngine.unload) await activeEngine.unload();
                }

                engine = webllm.CreateMLCEngine(
                    modelName,
                    {
                        initProgressCallback: (report) => {
                            statusDiv.innerText = report.text; // ダウンロード進捗を表示
                        }
                    }
                );
                
                await engine; // インスタンス完了を待つ
                statusDiv.innerText = "準備完了 (ローカル動作中)";
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "ここにプロンプトを入力してください";
                userInput.focus();
            } catch (error) {
                statusDiv.innerText = "初期化エラー (WebGPU未対応の可能性)";
                userInput.placeholder = "起動できませんでした";
                console.error(error);
            }
        }

        // モデル切り替えイベント
        modelSelect.addEventListener('change', (e) => {
            initChat(e.target.value);
        });

        // メッセージ送信
        window.sendMessage = async function() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage(text, 'user');
            messages.push({ role: "user", content: text });

            const aiMessageId = appendMessage("思考中...", 'ai');
            const aiMessageElement = document.getElementById(aiMessageId);

            try {
                let aiResponse = "";
                const activeEngine = await engine;
                const completion = await activeEngine.chat.completions.create({
                    messages: messages,
                    stream: true
                });

                for await (const chunk of completion) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    aiResponse += delta;
                    aiMessageElement.innerText = aiResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                messages.push({ role: "assistant", content: aiResponse });
            } catch (error) {
                aiMessageElement.innerText = "エラーが発生しました。モデルサイズが大きすぎるか、VRAM不足の可能性があります。";
                console.error(error);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // 画面へのメッセージ追加
        function appendMessage(text, sender) {
            const id = 'msg-' + Date.now();
            const isUser = sender === 'user';
            
            const html = isUser ? `
                <div class="flex gap-4 items-start justify-end">
                    <div class="bg-[#2f303a] text-gray-100 p-3 rounded-2xl max-w-[85%] leading-relaxed break-words text-sm md:text-base">${text}</div>
                </div>
            ` : `
                <div class="flex gap-4 items-start">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex-shrink-0 flex items-center justify-center text-xs font-bold text-white">AI</div>
                    <div id="${id}" class="space-y-2 max-w-[85%] text-gray-200 leading-relaxed break-words text-sm md:text-base">${text}</div>
                </div>
            `;
            
            chatContainer.insertAdjacentHTML('beforeend', html);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        // 初回起動（デフォルト選択されているモデルで開始）
        initChat(modelSelect.value);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.error('SW Registration Failed', err));
            });
        }
    </script>
</body>
</html>
