<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e24">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムスクロールバーと非表示設定 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#131314] text-[#e3e3e3] font-sans h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#1e1e24] p-4 flex-col justify-between hidden md:flex">
        <div>
            <h1 class="text-xl font-semibold text-white mb-6 px-2">Local Gemini</h1>
            <button onclick="window.location.reload()" class="w-full bg-[#282a36] hover:bg-[#343746] text-sm py-2.5 px-4 rounded-full flex items-center gap-2 transition">
                <span>+</span> 新しいチャット
            </button>
        </div>
        <div class="text-xs text-gray-500 p-2">
            Powered by WebLLM
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <header class="p-4 flex justify-between items-center border-b border-[#282a36] md:border-none">
            <span class="text-lg font-medium md:text-xl">WebLLM Chat</span>
            <div id="status" class="text-sm bg-[#282a36] px-3 py-1 rounded-full text-gray-400">
                AI初期化中...
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:px-24 space-y-6 no-scrollbar pb-32">
            <div class="flex gap-4 items-start">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex-shrink-0 flex items-center justify-center text-xs font-bold">AI</div>
                <div class="space-y-2 max-w-[85%]">
                    <p class="text-gray-200 leading-relaxed">こんにちは！ブラウザローカルで動くAIチャットです。何かお手伝いできることはありますか？</p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#131314] via-[#131314] to-transparent pt-6 pb-4 px-4 md:px-24">
            <div class="max-w-4xl mx-auto bg-[#1e1e24] rounded-3xl p-2 flex items-center border border-transparent focus-within:border-[#4b5563] transition shadow-lg">
                <input type="text" id="user-input" disabled
                    class="flex-1 bg-transparent px-4 py-2 text-white placeholder-gray-500 focus:outline-none text-base w-full" 
                    placeholder="ここにプロンプトを入力してください"
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()" disabled
                    class="bg-[#2f303a] hover:bg-[#3e3f4d] disabled:opacity-40 text-white w-10 h-10 rounded-full flex items-center justify-center transition flex-shrink-0">
                    ➔
                </button>
            </div>
            <p class="text-[11px] text-center text-gray-500 mt-2">
                WebLLMはモデルをブラウザのキャッシュに保存します。初回はダウンロードに時間がかかります。
            </p>
        </div>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // 軽量で日本語が比較的得意なモデル（Llama-3-8B もしくは Qwen2-1.5B などがおすすめ）
        const selectedModel = "Qwen2-1.5B-Instruct-q4f16_1-MLC"; 
        
        let engine;
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDiv = document.getElementById('status');

        // チャット履歴管理
        const messages = [];

        async function initChat() {
            try {
                engine = new webllm.CreateMLCEngine(
                    selectedModel,
                    {
                        initProgressCallback: (report) => {
                            statusDiv.innerText = report.text; // ダウンロード進捗を表示
                        }
                    }
                );
                
                statusDiv.innerText = "準備完了 (ローカル動作中)";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (error) {
                statusDiv.innerText = "初期化エラー";
                console.error(error);
            }
        }

        // メッセージ送信処理
        window.sendMessage = async function() {
            const text = userInput.value.trim();
            if (!text) return;

            // 画面入力のリセット
            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;

            // ユーザーメッセージの描画
            appendMessage(text, 'user');
            messages.push({ role: "user", content: text });

            // AIメッセージ用プレースホルダーの作成
            const aiMessageId = appendMessage("思考中...", 'ai');
            const aiMessageElement = document.getElementById(aiMessageId);

            try {
                let aiResponse = "";
                const completion = await (await engine).chat.completions.create({
                    messages: messages,
                    stream: true // ストリーミング再生
                });

                for await (const chunk of completion) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    aiResponse += delta;
                    aiMessageElement.innerText = aiResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight; // 自動スクロール
                }

                messages.push({ role: "assistant", content: aiResponse });
            } catch (error) {
                aiMessageElement.innerText = "エラーが発生しました。リロードして試してください。";
                console.error(error);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // メッセージを画面に追加するヘルパー
        function appendMessage(text, sender) {
            const id = 'msg-' + Date.now();
            const isUser = sender === 'user';
            
            const html = isUser ? `
                <div class="flex gap-4 items-start justify-end">
                    <div class="bg-[#2f303a] text-gray-100 p-3 rounded-2xl max-w-[85%] leading-relaxed break-words">${text}</div>
                </div>
            ` : `
                <div class="flex gap-4 items-start">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex-shrink-0 flex items-center justify-center text-xs font-bold">AI</div>
                    <div id="${id}" class="space-y-2 max-w-[85%] text-gray-200 leading-relaxed break-words">${text}</div>
                </div>
            `;
            
            chatContainer.insertAdjacentHTML('beforeend', html);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

            // 初期化開始
            initChat();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered', reg))
                    .catch(err => console.error('SW registration failed', err));
            });
        }
    </script>
</body>
</html>
